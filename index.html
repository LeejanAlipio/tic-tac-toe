<html lang="en">
<head>

    <title>Tic Tac Toe</title>

    <script src="index.js" defer></script>
</head>

            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>
    </div>

</html>

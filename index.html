<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>
    <div class="container">
        <form class="start-game" action="#" id="names">
            <div class="inputs">
                <input type="text" name="Player-one-name" id="player-one" placeholder="Player One Name">
                <input type="text" name="Player-two-name" id="player-two" placeholder="Player Two Name">
            </div>
            <button type="submit" form="names" class="start-btn">Start Game</button>
        </form>
        <h2 class="active-player">Player One's Turn</h2>
        <div class="players-score">
            <div class="score">
                <h2 class="player-one-name">Player One</h2>
                <p class="player-one-score">0</p>
            </div>
            <div class="score">
                <h2 class="player-two-name">Player Two</h2>
                <p class="player-two-score">0</p>
            </div>
        </div>
        <div class="board-container">

        </div>

        <button class="reset-btn">PLAY AGAIN</button>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>
    <div class="container">
        <h2 class="active-player"></h2>
        <div class="players-score">
            <div class="score">
                <h2 class="player-one-name"></h2>
                <p class="player-one-score"></p>
            </div>
            <div class="score">
                <h2 class="player-two-name"></h2>
                <p class="player-two-score"></p>
            </div>
        </div>
        <div class="board-container">

        </div>

        <button class="reset-btn">PLAY AGAIN</button>
    </div>
</body>
</html>
